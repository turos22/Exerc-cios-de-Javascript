<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilo.css">
    <script src="funcoes.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

</head>
<body class="bg-dark text-white">
    <div id="bolinhas"></div>

    <nav style="display: flex; justify-content: space-between; align-items: center;">
        <div class="cor_fundo">
            <a onclick="alterarfundo(1)"><i class="fa-solid fa-sun icone_fundo" id="sol"></i></a>
            <a onclick="alterarfundo(2)"><i class="fa-solid fa-moon icone_fundo active" id="lua"></i></a>
            <select onchange="alterarfundo(this.value)">
                <option value="3">Azul</option>
                <option value="4">Verde</option>
                <option value="5">Roxo</option>
            </select>
        </div>
    </nav>
    
    <section>
        <div class="dados">
        <h1>Lista de Exercícios</h1>
        <p>Escolha abaixo o Exercício que deseja executar:</p>
            <div class="dropdown">
                    <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton1" data-bs-toggle="dropdown" aria-expanded="false" style=" font-size: 1rem;
                        background-color: blue;
                        box-shadow: 0 0 20px blue;
                        border: 0;
                        border-radius: 10px;
                        font-size: 1.25rem;">
                        Dropdown button
                    </button>
                    <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton1">
                        <li><a class="dropdown-item" onclick="alterarexercicio(1)">Inverter Palavra</a></li>
                        <li><a class="dropdown-item" onclick="alterarexercicio(2)">Inverter Texto</a></li>
                        <li><a class="dropdown-item" onclick="alterarexercicio(3)">Guardar Palavra</a></li>
                        <li><a class="dropdown-item" onclick="alterarexercicio(4)">Remover Vogais</a></li>
                        <li><a class="dropdown-item" onclick="alterarexercicio(5)">Calcular Salário</a></li>
                        <li><a class="dropdown-item" onclick="alterarexercicio(6)">Incrementar</a></li>
                        <li><a class="dropdown-item" onclick="alterarexercicio(7)">Cronometro</a></li>
                        <li><a class="dropdown-item" onclick="alterarexercicio(8)">Validar Cadastro</a></li>
                    </ul>
            </div>
                <div class="form">
                    <div>
                        <label for="entrada" id="lbl">Teste</label>
                        <input type="text" id="entrada">
                        <textarea id="textarea" rows="5" cols="30" style="display: none;"></textarea>
                    </div>
                    
                    <button  id="resp" onclick="gerarresultado()">Gerar Resposta</button>
                    <div style="margin: 20px;">
                        <h3 style="font-size: 1.25rem; color: yellow;" id="resposta_label">Resultado</h3>
                        <p id="resultado"></p>
                    </div>

                    <div class="incremento" style="display: none;" id="incremento">
                        <h1 class="numero_alvo" style="text-align: center; font-size: 5rem; margin-bottom: 20px;">0</h1>
                        <div style="display: flex; flex-direction: row; gap: 10px;">
                            <button style="background-color: red;" onclick="incrementar(-1)"> Decrementar-</button>
                            <button style="background-color: green;" onclick="incrementar(1)"> Incrementar+</button>
                        </div>
                    </div>

                    <div class="cronometro" style="display: flex; flex-direction: row; padding: 10px; justify-content: center; align-items: center; border: 1px solid white; border-radius: 10px; display: none;" id="cronometro">
                        <h1 style="text-align: center; font-size: 5rem; margin-bottom: 20px;" id="min_crono">00</h1>
                        <h1 style="text-align: center; font-size: 5rem; margin-bottom: 20px;">:</h1>
                        <h1 style="text-align: center; font-size: 5rem; margin-bottom: 20px;" id="seg_crono">00</h1>
                    </div>
                    <div style="display: flex; flex-direction: row; gap: 10px; justify-content: center; align-items: center; margin-top: 20px; display: none;" id="botoes_cronometro">
                        <button style="background-color: green;" onclick="iniciarCronometro()">Iniciar</button>
                        <button style="background-color: red;" onclick="pararCronometro()">Parar</button>
                        <button style="background-color: blue;" onclick="resetarCronometro()">Resetar</button>
                    </div>

                    <form class="validar_cadastro" id="cadastro" style="display: none;">
                        <label for="nome">Nome Completo:</label>
                        <input type="text" id="nome" placeholder="Nome Completo" style="margin-bottom: 20px;">

                        <label for="email">Email:</label>
                        <input type="email" id="email" placeholder="Email" style="margin-bottom: 20px;">

                        <label for="cpf">CPF:</label>
                        <input type="text" id="cpf" placeholder="CPF" style="margin-bottom: 20px;">

                        <label for="celular">Celular:</label>
                        <input type="text" id="celular" placeholder="Celular" style="margin-bottom: 20px;">

                        <button type="button" style="background-color: purple;" onclick="validarCadastro()">Cadastrar</button>
                    </form>
                    
                </div>
        </div>       
    </section>
</body>
</html>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
